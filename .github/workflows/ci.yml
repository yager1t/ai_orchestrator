name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check ai_orchestrator tests

      - name: Type check
        run: python -m mypy

      - name: Run tests
        run: python -m pytest

      - name: Compile package
        run: python -m compileall ai_orchestrator

      - name: Run ai-orch verification
        run: python -m ai_orchestrator verify --repo .

      - name: Packaged install smoke
        run: |
          python -m venv .package-smoke-venv
          .package-smoke-venv/bin/python -m pip install . --no-deps
          .package-smoke-venv/bin/ai-orch --version
          .package-smoke-venv/bin/ai-orch --help

      - name: Check diff whitespace
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --check "origin/${{ github.base_ref }}...HEAD"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            git diff --check "${{ github.event.before }}" "${{ github.sha }}"
          else
            git diff-tree --check --root --no-commit-id -r "${{ github.sha }}"
          fi
