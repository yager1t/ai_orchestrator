project:
  name: "ai-orchestrator"
  repo: "."

orchestrator:
  default_agent: "kimi"
  fallback_agents:
    - "claude"
    - "mock"
  max_iterations: 10
  max_no_change_iterations: 2
  max_runtime_sec: 7200

agents:
  mock:
    enabled: true
    type: "mock"

  generic:
    enabled: false
    type: "generic_cli"
    command: "echo"
    args:
      - "{prompt}"
    timeout_sec: 300

  codex:
    enabled: false
    type: "codex_exec"
    command: "codex"
    args:
      - "exec"
      - "--json"
      - "--sandbox"
      - "workspace-write"
      - "{prompt}"
    timeout_sec: 1800

  claude:
    enabled: true
    type: "claude_headless"
    command: "claude"
    args:
      - "-p"
      - "--output-format"
      - "json"
      - "--max-budget-usd"
      - "2"
      - "--permission-mode"
      - "acceptEdits"
      - "--append-system-prompt"
      - "The user message contains a complete ai-orch autopilot plan item. Execute the Task bullet exactly. Do not ask the user to repeat the plan item."
      - "{prompt}"
    timeout_sec: 1800

  # Kimi/Gemini are generic CLI aliases. If command/args are omitted,
  # defaults are: kimi -> kimi {prompt}; gemini -> gemini -p {prompt}.
  # Keep command/args explicit when local CLI flags differ.
  kimi:
    enabled: true
    type: "kimi_cli"
    command: "%LOCALAPPDATA%\\Programs\\kimi-code\\bin\\kimi.exe"
    args:
      - "--output-format"
      - "text"
      - "-p"
      - "{prompt}"
    timeout_sec: 1800
    env:
      KIMI_SHELL_PATH: "%PROGRAMFILES%\\Git\\bin\\bash.exe"

  gemini:
    enabled: false
    type: "gemini_cli"
    command: "gemini"
    args:
      - "-p"
      - "{prompt}"
    timeout_sec: 1800

verification:
  strict: true
  commands:
    - name: "compile"
      run: "python -m compileall ai_orchestrator"
      timeout_sec: 120
    - name: "tests"
      run: "python -m pytest"
      timeout_sec: 300

policy:
  deny:
    - "rm -rf /"
    - "cat ~/.ssh"
    - "cat ~/.codex/auth.json"
  require_approval:
    - "git push"
    - "rm -rf"
    - "pip install"
    - "npm install"
    - "network call"
